name: Deploy Hugging Face Space

on:
  push:
    branches:
      - master
    paths:
      - 'huggingface/**'
      - 'src/**'
      - 'package.json'
      - '.env.example'
      - '.github/workflows/deploy-hf-space.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
      HF_LS_DOWNLOAD_URL: ${{ vars.HF_LS_DOWNLOAD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN" || { echo "Missing secret HF_TOKEN" >&2; exit 1; }
          test -n "$HF_SPACE_REPO" || { echo "Missing secret HF_SPACE_REPO" >&2; exit 1; }
          test -n "$HF_LS_DOWNLOAD_URL" || { echo "Missing repo variable HF_LS_DOWNLOAD_URL" >&2; exit 1; }
          case "$HF_LS_DOWNLOAD_URL" in
            *.tar.gz) ;;
            *) echo "HF_LS_DOWNLOAD_URL must point to the official Linux x64 tar.gz package" >&2; exit 1 ;;
          esac

      - name: Assemble Space payload
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="$RUNNER_TEMP/dist-hf-space"
          mkdir -p "$DIST_DIR"
          cp package.json "$DIST_DIR/package.json"
          cp .env.example "$DIST_DIR/.env.example"
          cp huggingface/entrypoint.sh "$DIST_DIR/entrypoint.sh"
          cp huggingface/README.md "$DIST_DIR/README.md"
          cp huggingface/.dockerignore "$DIST_DIR/.dockerignore"
          cp -R src "$DIST_DIR/src"
          node --input-type=module -e "import { readFileSync, writeFileSync } from 'node:fs'; const template = readFileSync('huggingface/Dockerfile', 'utf8'); const rendered = template.replace('__LS_DOWNLOAD_URL__', process.env.HF_LS_DOWNLOAD_URL); writeFileSync(process.env.RUNNER_TEMP + '/dist-hf-space/Dockerfile', rendered);"

      - name: Sync to Hugging Face Space
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="$RUNNER_TEMP/dist-hf-space"
          SPACE_DIR="$RUNNER_TEMP/hf-space"
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" "$SPACE_DIR"
          find "$SPACE_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "$DIST_DIR"/. "$SPACE_DIR"/
          cd "$SPACE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "Deploy from GitHub: ${GITHUB_SHA}"
          git push origin HEAD
